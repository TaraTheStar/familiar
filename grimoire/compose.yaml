# Local development / self-hosted deployment for stackend.
#
# Usage:
#   podman-compose up -d
#   podman-compose logs -f stackend
#
# stackend listens on port 9099. The device is flashed (menuconfig
# CONFIG_OTA_URL) to dial http://<LAN_IP>:9099/grimoire/ota/ on boot; that OTA
# endpoint hands back the WS URL (-ws-url) the device then dials for the live
# session. v2-only since the v1 protocol + the legacy /xiaozhi/ routes were
# removed (WS3) — the device must be reflashed to /grimoire/ before connecting.
#
# To deploy: stop the old xiaozhi-server container bound to 9099, start this.

services:
  stackend:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/stackend:dev
    container_name: stackend
    restart: unless-stopped
    ports:
      - "9099:9099"
    # Per-deployment values come from .env (gitignored); see .env.example for
    # the template. Compose interpolates ${VAR} from .env automatically — copy
    # .env.example to .env and fill it in before deploying. The secret
    # (LLM_API_KEY) lives only in .env, never in this committed file.
    command:
      - "-addr=:9099"
      - "-ws-url=ws://${LAN_IP}:9099/grimoire/"       # LAN WS URL advertised to the device
      - "-firmware-version=1.3.1"                       # device's current; suppresses OTA
      - "-log-level=info"
      # Use the container_name, not the service name: pinning container_name
      # below makes podman-compose drop the auto "kokoro" DNS alias, so
      # http://kokoro:8880 fails to resolve. stackend-kokoro always resolves.
      - "-kokoro-url=http://stackend-kokoro:8880"
      - "-kokoro-voice=af_heart"
      - "-kokoro-speed=0.85"
      - "-kokoro-lang=a"
      - "-whisper-model=/opt/stackend/whisper-base.en.bin"
      - "-asr-streaming"                                # WS4 F1: incremental transcript{final:false} partials (opt-in)
      # Tail-clip diagnosis landed: WaitForPlaybackQueueEmpty raced a frame
      # mid-decode/mid-I2S, and the Listening entry's ResetDecoder flushed it —
      # fixed in firmware (playback_inflight_ in the wait predicate). 400 (the
      # flag default, mirroring v1's ttsLead) is kept as safety margin; try
      # dropping to 0 once the fixed firmware is verified on hardware.
      - "-tts-tail-pad-ms=400"
      # External MCP tool adapter (WS4 F2): opt-in. Uncomment to bridge the
      # servers in mcp.example.json (LLM-facing only, never sent to the
      # device); the container image must provide the launchers it names
      # (e.g. uvx). See grimoire/README.md.
      # - "-mcp-config=/etc/stackend/mcp.json"
      - "-llm-url=${LLM_URL}"                          # llama-swap host
      - "-llm-model=${LLM_MODEL}"
      - "-llm-api-key=${LLM_API_KEY}"
      - "-llm-max-tokens=200"
      - "-timezone=${TIMEZONE:-America/New_York}"        # for the get_current_time tool
      - "-system-prompt-file=/etc/stackend/persona.txt"
      - "-vision-url=http://${LAN_IP}:9099/vision"     # advertised to device for camera tool
    volumes:
      - ./persona.txt:/etc/stackend/persona.txt:ro
    depends_on:
      - kokoro
    networks:
      - stackend

  # Kokoro TTS sidecar. Internal-only: only stackend talks to it.
  # If you already have a kokoro container running on this host under a
  # different name, point -kokoro-url at it instead and delete this service.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: stackend-kokoro
    restart: unless-stopped
    environment:
      - DOWNLOAD_MODEL=true
    volumes:
      # Named volume, NOT a host bind mount: rootless podman maps the
      # container's user to a host uid that can't write a bind-mounted dir,
      # which crash-loops the model download (Errno 13). A named volume is
      # initialized writable for the container user.
      - kokoro-models:/app/api/src/models
    networks:
      - stackend

volumes:
  kokoro-models:

networks:
  stackend:
    driver: bridge
