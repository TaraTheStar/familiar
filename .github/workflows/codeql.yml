name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Go has no build-less extraction mode, and grimoire links
          # whisper.cpp + libopus via cgo, so it must actually build. We keep
          # that affordable by caching the whisper.cpp static libs on their
          # pinned submodule SHA (see the "Cache whisper.cpp build" step): a
          # steady-state run restores the cache and only re-compiles when the
          # submodule is bumped. C/C++ and Python extract without any build.
          - language: go
            build-mode: manual
          - language: c-cpp
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Only the Go job needs the whisper.cpp submodule; c-cpp/python skip
          # the extra fetch (whisper.cpp is paths-ignored for c-cpp anyway).
          submodules: ${{ matrix.language == 'go' && 'recursive' || 'false' }}

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: grimoire/go.mod

      - name: Install cgo build deps
        if: matrix.language == 'go'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libopus-dev libopusfile-dev pkg-config

      - name: Resolve pinned whisper.cpp commit
        if: matrix.language == 'go'
        id: whisper
        run: echo "sha=$(git rev-parse HEAD:grimoire/third_party/whisper.cpp)" >> "$GITHUB_OUTPUT"

      - name: Cache whisper.cpp build
        if: matrix.language == 'go'
        uses: actions/cache@v4
        with:
          path: grimoire/third_party/whisper.cpp/build
          key: whisper-${{ runner.os }}-${{ steps.whisper.outputs.sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build grimoire (Go manual build-mode)
        if: matrix.language == 'go'
        working-directory: grimoire
        run: |
          make whisper-build   # no-op when the cache restored build/
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
